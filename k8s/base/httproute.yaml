apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: microservice-example
  labels:
    app.kubernetes.io/name: microservice-example
spec:
  # Attach to the internal Envoy gateway; external-dns creates the DNS record
  # from the hostname, TLS is served by the wildcard cert on the gateway.
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - dotnet-lab.tool-chain.io
  rules:
    - backendRefs:
        - name: microservice-example
          port: 8080
