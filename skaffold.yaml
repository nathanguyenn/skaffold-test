apiVersion: skaffold/v4beta14   # latest schema for skaffold v2.22.1 (verified via `skaffold schema list`)
kind: Config
metadata:
  name: microservice-example
build:
  artifacts:
    # Image name MUST match the ref in k8s/base/deployment.yaml (both the app and
    # the migrate initContainer) — Skaffold rewrites matching refs with the built tag.
    - image: ghcr.io/nathanguyenn/microservice-example
      docker:
        dockerfile: Dockerfile
        # The Dockerfile COPYs from src/MicroserviceExample/, so the build context
        # must be the repo root, not the Dockerfile's dir (which is the same here).
      context: .
  local:
    push: true              # real cluster can't pull from a local daemon → push to ghcr.io
    useBuildkit: true       # Dockerfile uses `# syntax=` + COPY --link (BuildKit features)
manifests:
  kustomize:
    paths: ["k8s/overlays/dev"]
deploy:
  kubectl: {}               # deploys to the CURRENT kubectl context — confirm before `skaffold run`
verify:
  # Both checks run as in-cluster Jobs (executionMode.kubernetesCluster) because the
  # Service ClusterIP DNS is only resolvable from inside the cluster.
  - name: smoke-health
    container:
      name: smoke
      image: curlimages/curl:8.11.1
      command: ["/bin/sh", "-c"]
      args:
        - "curl -fsS --retry 10 --retry-connrefused --retry-delay 3 http://microservice-example.poc-anh.svc.cluster.local:8080/readyz"
    executionMode:
      kubernetesCluster: {}
  - name: smoke-roundtrip
    container:
      name: roundtrip
      image: curlimages/curl:8.11.1
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          base=http://microservice-example.poc-anh.svc.cluster.local:8080
          curl -fsS --retry 10 --retry-connrefused --retry-delay 3 -XPOST "$base/projects" \
            -H 'content-type: application/json' -d '{"name":"smoke"}'
          curl -fsS "$base/projects" | grep smoke
    executionMode:
      kubernetesCluster: {}

# Profiles auto-select from your CURRENT kube-context (activation.kubeContext), so the
# correct build/push behavior applies to whichever cluster you're pointed at — no more
# accidentally pushing to ghcr for a throwaway local run, or deploying to the wrong place.
# Force one explicitly with `skaffold run -p <name>`; inspect the merged result with
# `skaffold diagnose -p <name>`.
profiles:
  # Bare-metal cluster. Workers pull from ghcr, so push stays true (the base default) —
  # this profile mainly exists to name the intent and auto-activate on the right context.
  - name: cluster
    activation:
      - kubeContext: anh@tool-chain

  # OrbStack's built-in k8s: skip the ghcr round-trip and run the locally-built image
  # straight from the daemon (faster, no login).
  # GOTCHA: only works when your `docker` context ALSO points at OrbStack (same daemon
  # backs the cluster). On Docker Desktop's daemon the image won't be visible to OrbStack
  # k8s and pods ImagePull-fail — run `docker context use orbstack` before `-p local`.
  - name: local
    activation:
      - kubeContext: orbstack
    patches:
      - op: replace
        path: /build/local/push
        value: false
